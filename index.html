<!DOCTYPE html>

<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avanço Diário</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── TOKENS ─────────────────────────────────────────────── */
:root {
  --gold:        #C9A84C;
  --gold-light:  #E8C97A;
  --gold-dim:    #C9A84C22;

/* LIGHT */
–bg:          #F7F6F3;
–bg2:         #FFFFFF;
–border:      #E4E2DC;
–text:        #1A1916;
–text2:       #6B6860;
–text3:       #A8A69F;
–card-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
}

[data-theme=“dark”] {
–bg:          #141412;
–bg2:         #1C1C19;
–border:      #2C2C28;
–text:        #ECEAE4;
–text2:       #8A8880;
–text3:       #4A4A46;
–card-shadow: 0 1px 3px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.2);
}

/* ─── RESET ──────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
button { font: inherit; cursor: pointer; border: none; background: none; }
input  { font: inherit; outline: none; border: none; background: none; }

/* ─── BASE ───────────────────────────────────────────────── */
body {
font-family: ‘Geist’, sans-serif;
font-weight: 400;
background: var(–bg);
color: var(–text);
min-height: 100vh;
transition: background .3s, color .3s;
-webkit-font-smoothing: antialiased;
}

/* ─── LAYOUT ─────────────────────────────────────────────── */
.shell {
max-width: 420px;
margin: 0 auto;
min-height: 100vh;
display: flex;
flex-direction: column;
padding-bottom: 6rem;
}

/* ─── HEADER ─────────────────────────────────────────────── */
.header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 1.25rem 1.25rem 0;
position: sticky;
top: 0;
background: var(–bg);
z-index: 50;
transition: background .3s;
}

.header-left {}

.wordmark {
font-family: ‘Playfair Display’, serif;
font-weight: 400;
font-size: 1.15rem;
color: var(–text);
letter-spacing: .01em;
line-height: 1;
}

.wordmark span { color: var(–gold); }

.subline {
font-size: .65rem;
color: var(–text3);
letter-spacing: .12em;
text-transform: uppercase;
margin-top: .25rem;
}

.header-actions {
display: flex;
align-items: center;
gap: .5rem;
}

/* Theme toggle */
.theme-toggle {
width: 36px;
height: 36px;
border-radius: 50%;
border: 1px solid var(–border);
background: var(–bg2);
display: flex;
align-items: center;
justify-content: center;
color: var(–text2);
font-size: .85rem;
transition: border-color .2s, background .3s;
}
.theme-toggle:hover { border-color: var(–gold); color: var(–gold); }

/* ─── DATE STRIP ─────────────────────────────────────────── */
.date-strip {
display: flex;
align-items: center;
justify-content: space-between;
padding: 1rem 1.25rem .75rem;
}

.date-main {
font-family: ‘Playfair Display’, serif;
font-size: 1.6rem;
line-height: 1;
color: var(–text);
}

.date-sub {
font-size: .7rem;
color: var(–text3);
letter-spacing: .08em;
text-transform: uppercase;
margin-top: .2rem;
}

/* Score pill */
.score-pill {
display: flex;
flex-direction: column;
align-items: flex-end;
}

.score-num {
font-family: ‘Playfair Display’, serif;
font-size: 1.8rem;
line-height: 1;
color: var(–gold);
transition: all .35s;
}

.score-cap {
font-size: .6rem;
color: var(–text3);
letter-spacing: .1em;
text-transform: uppercase;
}

/* ─── PROGRESS BAR ───────────────────────────────────────── */
.progress-wrap {
padding: 0 1.25rem;
margin-bottom: 1.25rem;
}

.progress-track {
height: 3px;
background: var(–border);
border-radius: 99px;
overflow: hidden;
}

.progress-fill {
height: 100%;
background: linear-gradient(90deg, var(–gold), var(–gold-light));
border-radius: 99px;
transition: width .6s cubic-bezier(.34,1.56,.64,1);
}

.progress-labels {
display: flex;
justify-content: space-between;
margin-top: .4rem;
}

.progress-labels span {
font-size: .6rem;
color: var(–text3);
letter-spacing: .08em;
}

/* ─── FUTURE ALERT CARD ──────────────────────────────────── */
.future-card {
margin: 0 1.25rem 1rem;
padding: .75rem 1rem;
background: var(–bg2);
border: 1px solid var(–border);
border-left: 2.5px solid var(–gold);
border-radius: 10px;
box-shadow: var(–card-shadow);
display: flex;
align-items: center;
gap: .75rem;
transition: background .3s, border-color .2s;
}

.future-card.done {
border-left-color: #5CA85C;
}

.future-icon {
width: 32px;
height: 32px;
border-radius: 8px;
background: var(–gold-dim);
display: flex;
align-items: center;
justify-content: center;
font-size: .95rem;
flex-shrink: 0;
transition: background .2s;
}

.future-card.done .future-icon { background: #5CA85C18; }

.future-text-wrap {}

.future-label {
font-size: .6rem;
letter-spacing: .12em;
text-transform: uppercase;
color: var(–gold);
font-weight: 600;
}

.future-card.done .future-label { color: #5CA85C; }

.future-title {
font-size: .82rem;
color: var(–text2);
margin-top: .1rem;
}

/* ─── SECTION LABEL ──────────────────────────────────────── */
.section-label {
display: flex;
align-items: center;
gap: .6rem;
padding: 0 1.25rem;
margin-bottom: .6rem;
}

.section-label-text {
font-size: .6rem;
letter-spacing: .14em;
text-transform: uppercase;
color: var(–text3);
white-space: nowrap;
}

.section-label-line {
flex: 1;
height: 1px;
background: var(–border);
}

/* ─── HABIT CARD ─────────────────────────────────────────── */
.habits-list {
display: flex;
flex-direction: column;
gap: .45rem;
padding: 0 1.25rem;
margin-bottom: 1.25rem;
}

.habit-card {
display: flex;
align-items: center;
gap: .85rem;
padding: .85rem 1rem;
background: var(–bg2);
border: 1px solid var(–border);
border-radius: 12px;
box-shadow: var(–card-shadow);
cursor: pointer;
transition: background .3s, border-color .2s, transform .15s, box-shadow .2s;
-webkit-tap-highlight-color: transparent;
user-select: none;
}

.habit-card:hover  { border-color: var(–gold); }
.habit-card:active { transform: scale(.985); }

.habit-card.checked {
background: var(–bg);
border-color: var(–border);
box-shadow: none;
}

/* Checkbox */
.hc-check {
width: 22px;
height: 22px;
border-radius: 6px;
border: 1.5px solid var(–border);
flex-shrink: 0;
display: flex;
align-items: center;
justify-content: center;
transition: all .2s;
background: var(–bg);
}

.habit-card.checked .hc-check {
background: var(–gold);
border-color: var(–gold);
}

.hc-check svg {
opacity: 0;
transform: scale(.5);
transition: all .2s;
}

.habit-card.checked .hc-check svg {
opacity: 1;
transform: scale(1);
}

/* Text */
.hc-body { flex: 1; min-width: 0; }

.hc-name {
font-size: .87rem;
font-weight: 500;
color: var(–text);
transition: color .2s;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.habit-card.checked .hc-name {
color: var(–text3);
text-decoration: line-through;
text-decoration-color: var(–text3);
}

.hc-meta {
font-size: .65rem;
color: var(–text3);
margin-top: .12rem;
}

/* Weight badge */
.hc-weight {
font-family: ‘Playfair Display’, serif;
font-size: 1rem;
color: var(–text3);
transition: color .2s;
flex-shrink: 0;
}

.habit-card.checked .hc-weight { color: var(–gold); }

/* ─── BOTTOM NAV ─────────────────────────────────────────── */
.bottom-nav {
position: fixed;
bottom: 0;
left: 50%;
transform: translateX(-50%);
width: 100%;
max-width: 420px;
padding: .75rem 1.5rem 1.2rem;
background: var(–bg2);
border-top: 1px solid var(–border);
display: flex;
justify-content: space-around;
align-items: center;
z-index: 50;
transition: background .3s;
}

.nav-btn {
display: flex;
flex-direction: column;
align-items: center;
gap: .25rem;
color: var(–text3);
transition: color .2s;
padding: .25rem .5rem;
}

.nav-btn.active { color: var(–gold); }

.nav-icon { font-size: 1.1rem; line-height: 1; }
.nav-label { font-size: .55rem; letter-spacing: .1em; text-transform: uppercase; font-weight: 500; }

/* ─── PANELS ─────────────────────────────────────────────── */
.panel { display: none; animation: fadeUp .25s ease both; }
.panel.active { display: block; }

@keyframes fadeUp {
from { opacity: 0; transform: translateY(8px); }
to   { opacity: 1; transform: translateY(0); }
}

/* ─── WEEK PANEL ─────────────────────────────────────────── */
.week-grid {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: .35rem;
padding: 0 1.25rem;
margin-bottom: 1.25rem;
}

.wd {
display: flex;
flex-direction: column;
align-items: center;
gap: .3rem;
}

.wd-label {
font-size: .55rem;
letter-spacing: .08em;
text-transform: uppercase;
color: var(–text3);
}

.wd-bar-wrap {
width: 100%;
height: 56px;
background: var(–bg2);
border: 1px solid var(–border);
border-radius: 6px;
overflow: hidden;
position: relative;
}

.wd-fill {
position: absolute;
bottom: 0; left: 0; right: 0;
background: linear-gradient(to top, var(–gold), var(–gold-light));
border-radius: 4px;
transition: height .6s cubic-bezier(.34,1.56,.64,1);
}

.wd-fill.today {
background: linear-gradient(to top, var(–gold-light), #f5e09a);
}

.wd-score {
font-size: .58rem;
color: var(–text3);
}

/* ─── SUMMARY CARD ───────────────────────────────────────── */
.summary-card {
margin: 0 1.25rem 1rem;
padding: 1rem 1.1rem;
background: var(–bg2);
border: 1px solid var(–border);
border-radius: 12px;
box-shadow: var(–card-shadow);
display: grid;
grid-template-columns: 1fr 1fr;
gap: .8rem 1.2rem;
}

.sum-item-val {
font-family: ‘Playfair Display’, serif;
font-size: 1.5rem;
color: var(–gold);
line-height: 1;
}

.sum-item-lbl {
font-size: .6rem;
letter-spacing: .1em;
text-transform: uppercase;
color: var(–text3);
margin-top: .15rem;
}

/* ─── META CARD ──────────────────────────────────────────── */
.meta-cards {
display: flex;
flex-direction: column;
gap: .5rem;
padding: 0 1.25rem;
margin-bottom: 1.25rem;
}

.meta-card {
background: var(–bg2);
border: 1px solid var(–border);
border-radius: 12px;
padding: 1rem;
box-shadow: var(–card-shadow);
}

.meta-card-top {
display: flex;
justify-content: space-between;
align-items: flex-start;
margin-bottom: .65rem;
}

.meta-card-name {
font-size: .85rem;
font-weight: 500;
}

.meta-card-desc {
font-size: .65rem;
color: var(–text3);
margin-top: .1rem;
}

.meta-pct {
font-family: ‘Playfair Display’, serif;
font-size: 1.3rem;
color: var(–gold);
}

.meta-track {
height: 3px;
background: var(–border);
border-radius: 99px;
overflow: hidden;
}

.meta-fill {
height: 100%;
background: linear-gradient(90deg, var(–gold), var(–gold-light));
border-radius: 99px;
transition: width .6s ease;
}

/* ─── CONFIG PANEL ───────────────────────────────────────── */
.config-list {
display: flex;
flex-direction: column;
gap: 0;
background: var(–bg2);
border: 1px solid var(–border);
border-radius: 12px;
margin: 0 1.25rem 1rem;
overflow: hidden;
box-shadow: var(–card-shadow);
}

.cfg-row {
display: flex;
align-items: center;
gap: .7rem;
padding: .8rem 1rem;
border-bottom: 1px solid var(–border);
transition: background .15s;
}

.cfg-row:last-child { border-bottom: none; }

.cfg-name {
flex: 1;
font-size: .82rem;
min-width: 0;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.w-ctrl {
display: flex;
align-items: center;
gap: .35rem;
}

.w-btn {
width: 26px;
height: 26px;
border: 1px solid var(–border);
border-radius: 6px;
background: var(–bg);
color: var(–text2);
font-size: 1rem;
display: flex;
align-items: center;
justify-content: center;
transition: border-color .15s, color .15s;
}

.w-btn:hover { border-color: var(–gold); color: var(–gold); }

.w-val {
font-family: ‘Playfair Display’, serif;
font-size: 1rem;
color: var(–gold);
min-width: 1.6rem;
text-align: center;
}

.fut-toggle {
font-size: .58rem;
letter-spacing: .08em;
text-transform: uppercase;
padding: .22rem .5rem;
border: 1px solid var(–border);
border-radius: 4px;
color: var(–text3);
transition: all .15s;
}

.fut-toggle.on {
border-color: var(–gold);
color: var(–gold);
background: var(–gold-dim);
}

.rm-btn {
width: 22px;
height: 22px;
color: var(–text3);
font-size: .7rem;
border-radius: 4px;
transition: color .15s;
flex-shrink: 0;
}

.rm-btn:hover { color: #c05050; }

/* Add habit */
.add-row {
display: flex;
gap: .5rem;
margin: 0 1.25rem 1rem;
}

.add-input {
flex: 1;
background: var(–bg2);
border: 1px solid var(–border);
border-radius: 10px;
padding: .65rem .9rem;
font-size: .83rem;
color: var(–text);
transition: border-color .2s, background .3s;
}

.add-input:focus { border-color: var(–gold); }
.add-input::placeholder { color: var(–text3); }

.add-btn {
padding: .65rem 1rem;
background: var(–gold);
color: #fff;
border-radius: 10px;
font-size: .75rem;
font-weight: 600;
letter-spacing: .06em;
transition: opacity .2s;
white-space: nowrap;
}

.add-btn:hover { opacity: .88; }

.reset-btn {
display: block;
width: calc(100% - 2.5rem);
margin: 0 1.25rem .5rem;
padding: .7rem;
border: 1px solid var(–border);
border-radius: 10px;
color: var(–text3);
font-size: .7rem;
letter-spacing: .1em;
text-transform: uppercase;
text-align: center;
transition: border-color .2s, color .2s;
}

.reset-btn:hover { border-color: #c05050; color: #c05050; }

/* ─── TOAST ──────────────────────────────────────────────── */
.toast {
position: fixed;
bottom: 5.5rem;
left: 50%;
transform: translateX(-50%) translateY(10px);
background: var(–text);
color: var(–bg);
padding: .55rem 1.1rem;
border-radius: 99px;
font-size: .72rem;
font-weight: 500;
letter-spacing: .04em;
white-space: nowrap;
opacity: 0;
pointer-events: none;
transition: opacity .25s, transform .25s;
z-index: 200;
}

.toast.show {
opacity: 1;
transform: translateX(-50%) translateY(0);
}

/* ─── SCROLLBAR ──────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(–border); border-radius: 2px; }
</style>

</head>
<body>
<div class="shell">

  <!-- HEADER -->

  <header class="header">
    <div class="header-left">
      <div class="wordmark">Avanço<span>.</span></div>
      <div class="subline">Sistema de crescimento</div>
    </div>
    <div class="header-actions">
      <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" title="Alternar tema">☀</button>
    </div>
  </header>

  <!-- DATE + SCORE -->

  <div class="date-strip">
    <div>
      <div class="date-main" id="dateMain">—</div>
      <div class="date-sub" id="dateSub">—</div>
    </div>
    <div class="score-pill">
      <div class="score-num" id="scoreNum">0</div>
      <div class="score-cap">pts hoje</div>
    </div>
  </div>

  <!-- PROGRESS -->

  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-labels">
      <span id="pctLabel">0% do dia</span>
      <span id="maxLabel">máx 0 pts</span>
    </div>
  </div>

  <!-- PANELS -->

  <!-- HOJE -->

  <div class="panel active" id="panel-hoje">

```
<div id="futureCard" class="future-card">
  <div class="future-icon">⚡</div>
  <div class="future-text-wrap">
    <div class="future-label">Ação de Futuro</div>
    <div class="future-title" id="futureCardTitle">Pendente para hoje</div>
  </div>
</div>

<div class="section-label">
  <span class="section-label-text">Futuro</span>
  <div class="section-label-line"></div>
</div>
<div class="habits-list" id="futureHabits"></div>

<div class="section-label">
  <span class="section-label-text">Hábitos</span>
  <div class="section-label-line"></div>
</div>
<div class="habits-list" id="regularHabits"></div>
```

  </div>

  <!-- SEMANA -->

  <div class="panel" id="panel-semana">

```
<div class="section-label" style="padding-top:.25rem">
  <span class="section-label-text">Últimos 7 dias</span>
  <div class="section-label-line"></div>
</div>

<div class="week-grid" id="weekGrid"></div>

<div class="summary-card" id="summaryCard"></div>
```

  </div>

  <!-- METAS -->

  <div class="panel" id="panel-metas">
    <div class="section-label" style="padding-top:.25rem">
      <span class="section-label-text">Progresso semanal</span>
      <div class="section-label-line"></div>
    </div>
    <div class="meta-cards" id="metaCards"></div>
  </div>

  <!-- CONFIG -->

  <div class="panel" id="panel-config">
    <div class="section-label" style="padding-top:.25rem">
      <span class="section-label-text">Pesos & Prioridades</span>
      <div class="section-label-line"></div>
    </div>
    <div class="config-list" id="configList"></div>
    <div class="add-row">
      <input class="add-input" id="newHabitInput" placeholder="Nome do hábito..." maxlength="40">
      <button class="add-btn" onclick="addHabit()">+ Adicionar</button>
    </div>
    <button class="reset-btn" onclick="resetDay()">↺ Resetar dia atual</button>
  </div>

</div>

<!-- BOTTOM NAV -->

<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-hoje" onclick="switchTab('hoje', this)">
    <span class="nav-icon">◎</span>
    <span class="nav-label">Hoje</span>
  </button>
  <button class="nav-btn" id="nav-semana" onclick="switchTab('semana', this)">
    <span class="nav-icon">▦</span>
    <span class="nav-label">Semana</span>
  </button>
  <button class="nav-btn" id="nav-metas" onclick="switchTab('metas', this)">
    <span class="nav-icon">◈</span>
    <span class="nav-label">Metas</span>
  </button>
  <button class="nav-btn" id="nav-config" onclick="switchTab('config', this)">
    <span class="nav-icon">⊞</span>
    <span class="nav-label">Config</span>
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────────
const DEFAULT_HABITS = [
  { id:1, name:"Estudar sistema / produto",        weight:10, isFuture:true  },
  { id:2, name:"Prospectar cliente transportadora", weight:10, isFuture:true  },
  { id:3, name:"Avançar código / funcionalidade",  weight:8,  isFuture:false },
  { id:4, name:"Exercício físico",                 weight:5,  isFuture:false },
  { id:5, name:"Leitura / aprendizado",            weight:4,  isFuture:false },
  { id:6, name:"Organização pessoal",              weight:3,  isFuture:false },
  { id:7, name:"Sono regulado",                    weight:3,  isFuture:false },
];

const METAS = [
  { name:"Lançamento do produto",  desc:"Primeiro cliente pagante",  target:400, keys:[1,2,3] },
  { name:"Disciplina & saúde",     desc:"Corpo e mente em operação", target:200, keys:[4,7]   },
  { name:"Formação contínua",      desc:"Conhecimento acumulado",    target:150, keys:[5,6]   },
];

const DAYS  = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const MONTHS= ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

// ── STORAGE HELPERS ───────────────────────────────────────
const ls = { get:(k)=>{ try{return JSON.parse(localStorage.getItem(k))}catch{return null} }, set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)) };

function todayKey(){ const d=new Date(); return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }

function loadHabits()  { return ls.get('av2_habits') || JSON.parse(JSON.stringify(DEFAULT_HABITS)); }
function saveHabits(h) { ls.set('av2_habits', h); }

function loadChecked()  { return ls.get('av2_chk_'+todayKey()) || []; }
function saveChecked(c) { ls.set('av2_chk_'+todayKey(), c); }

function loadHistory()  { return ls.get('av2_hist') || {}; }
function saveHistory(h) { ls.set('av2_hist', h); }

// ── THEME ─────────────────────────────────────────────────
function toggleTheme(){
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isDark ? '☀' : '☾';
  ls.set('av2_theme', isDark ? 'light' : 'dark');
}
(function initTheme(){
  const t = ls.get('av2_theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn').textContent = t === 'dark' ? '☾' : '☀';
})();

// ── DATE ──────────────────────────────────────────────────
function setupDate(){
  const d = new Date();
  document.getElementById('dateMain').textContent = `${DAYS[d.getDay()]}, ${d.getDate()} ${MONTHS[d.getMonth()]}`;
  document.getElementById('dateSub').textContent  = `${d.getFullYear()} · semana ${getWeekNum(d)}`;
}
function getWeekNum(d){ const s=new Date(d.getFullYear(),0,1); return Math.ceil(((d-s)/86400000+s.getDay()+1)/7); }

// ── SCORE ─────────────────────────────────────────────────
function calcScore(h,c){ return h.reduce((s,x)=>c.includes(x.id)?s+x.weight:s,0); }
function calcMax(h)    { return h.reduce((s,x)=>s+x.weight,0); }

function updateScore(){
  const habits  = loadHabits();
  const checked = loadChecked();
  const score   = calcScore(habits, checked);
  const max     = calcMax(habits);
  const pct     = max>0 ? Math.round((score/max)*100) : 0;

  document.getElementById('scoreNum').textContent       = score;
  document.getElementById('progressFill').style.width   = pct+'%';
  document.getElementById('pctLabel').textContent       = pct+'% do dia';
  document.getElementById('maxLabel').textContent       = 'máx '+max+' pts';

  // history
  const hist = loadHistory();
  hist[todayKey()] = score;
  saveHistory(hist);

  // future card
  const futures = habits.filter(h=>h.isFuture);
  const futureDone = futures.some(h=>checked.includes(h.id));
  const card = document.getElementById('futureCard');
  const title = document.getElementById('futureCardTitle');

  if(futureDone){
    card.classList.add('done');
    title.textContent = 'Concluída — você está construindo o amanhã';
  } else {
    card.classList.remove('done');
    const pending = futures.find(h=>!checked.includes(h.id));
    title.textContent = pending ? pending.name : 'Pendente para hoje';
  }
}

// ── HABITS ────────────────────────────────────────────────
function renderHabits(){
  const habits  = loadHabits();
  const checked = loadChecked();

  ['futureHabits','regularHabits'].forEach(id=>document.getElementById(id).innerHTML='');

  habits.forEach(h=>{
    const el = document.createElement('div');
    el.className = 'habit-card'+(checked.includes(h.id)?' checked':'');
    el.innerHTML = `
      <div class="hc-check">
        <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
          <path d="M1 4L4 7.5L10 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="hc-body">
        <div class="hc-name">${h.name}</div>
        <div class="hc-meta">${h.weight} pts${h.isFuture?' · ação de futuro':''}</div>
      </div>
      <div class="hc-weight">+${h.weight}</div>`;
    el.addEventListener('click',()=>toggleHabit(h.id));
    document.getElementById(h.isFuture?'futureHabits':'regularHabits').appendChild(el);
  });

  updateScore();
}

function toggleHabit(id){
  const c = loadChecked();
  const i = c.indexOf(id);
  let added = false;
  if(i===-1){ c.push(id); added=true; } else { c.splice(i,1); }
  saveChecked(c);
  if(added){ const h=loadHabits().find(x=>x.id===id); if(h) toast(`+${h.weight} pts`); }
  renderHabits();
  if(document.getElementById('panel-semana').classList.contains('active')) renderWeek();
  if(document.getElementById('panel-metas').classList.contains('active'))  renderMetas();
}

// ── WEEK ──────────────────────────────────────────────────
function renderWeek(){
  const habits  = loadHabits();
  const history = loadHistory();
  const max     = calcMax(habits);
  const grid    = document.getElementById('weekGrid');
  grid.innerHTML = '';

  const d = new Date();
  let total=0, days50=0;

  for(let i=6;i>=0;i--){
    const t = new Date(d); t.setDate(d.getDate()-i);
    const k = `${t.getFullYear()}-${t.getMonth()}-${t.getDate()}`;
    const sc = history[k]||0;
    const pct = max>0 ? Math.min(100,(sc/max)*100) : 0;
    const isToday = i===0;
    total += sc;
    if(sc>=max*.5) days50++;

    const col = document.createElement('div');
    col.className='wd';
    col.innerHTML=`
      <div class="wd-label">${DAYS[t.getDay()]}</div>
      <div class="wd-bar-wrap"><div class="wd-fill${isToday?' today':''}" style="height:${pct}%"></div></div>
      <div class="wd-score">${sc}</div>`;
    grid.appendChild(col);
  }

  document.getElementById('summaryCard').innerHTML=`
    <div><div class="sum-item-val">${total}</div><div class="sum-item-lbl">Total semana</div></div>
    <div><div class="sum-item-val">${Math.round(total/7)}</div><div class="sum-item-lbl">Média diária</div></div>
    <div><div class="sum-item-val">${days50}</div><div class="sum-item-lbl">Dias +50%</div></div>
    <div><div class="sum-item-val">${max}</div><div class="sum-item-lbl">Máx por dia</div></div>`;
}

// ── METAS ─────────────────────────────────────────────────
function renderMetas(){
  const habits  = loadHabits();
  const d       = new Date();
  const byHabit = {};

  for(let i=0;i<7;i++){
    const t = new Date(d); t.setDate(d.getDate()-i);
    const k = `${t.getFullYear()}-${t.getMonth()}-${t.getDate()}`;
    const chk = ls.get('av2_chk_'+k)||[];
    chk.forEach(id=>{ byHabit[id]=(byHabit[id]||0)+(habits.find(h=>h.id===id)?.weight||0); });
  }

  const container = document.getElementById('metaCards');
  container.innerHTML='';

  METAS.forEach(meta=>{
    let earned=0;
    meta.keys.forEach(k=>{ earned+=(byHabit[k]||0); });
    const pct=Math.min(100,Math.round((earned/meta.target)*100));
    const card=document.createElement('div');
    card.className='meta-card';
    card.innerHTML=`
      <div class="meta-card-top">
        <div>
          <div class="meta-card-name">${meta.name}</div>
          <div class="meta-card-desc">${meta.desc}</div>
        </div>
        <div class="meta-pct">${pct}%</div>
      </div>
      <div class="meta-track"><div class="meta-fill" style="width:${pct}%"></div></div>`;
    container.appendChild(card);
  });
}

// ── CONFIG ────────────────────────────────────────────────
function renderConfig(){
  const habits = loadHabits();
  const list   = document.getElementById('configList');
  list.innerHTML='';

  habits.forEach(h=>{
    const row=document.createElement('div');
    row.className='cfg-row';
    row.innerHTML=`
      <div class="cfg-name">${h.name}</div>
      <div class="w-ctrl">
        <button class="w-btn" onclick="changeW(${h.id},-1)">−</button>
        <div class="w-val" id="wv${h.id}">${h.weight}</div>
        <button class="w-btn" onclick="changeW(${h.id},1)">+</button>
      </div>
      <button class="fut-toggle${h.isFuture?' on':''}" id="ft${h.id}" onclick="toggleFuture(${h.id})">${h.isFuture?'★ F':'☆ F'}</button>
      <button class="rm-btn" onclick="removeH(${h.id})">✕</button>`;
    list.appendChild(row);
  });
}

function changeW(id,d){
  const habits=loadHabits();
  const h=habits.find(x=>x.id===id);
  if(!h)return;
  h.weight=Math.max(1,Math.min(20,h.weight+d));
  saveHabits(habits);
  document.getElementById('wv'+id).textContent=h.weight;
  updateScore();
}

function toggleFuture(id){
  const habits=loadHabits();
  if(!habits.find(x=>x.id===id).isFuture){
    habits.forEach(x=>x.isFuture=false);
    habits.find(x=>x.id===id).isFuture=true;
  } else {
    habits.find(x=>x.id===id).isFuture=false;
  }
  saveHabits(habits);
  renderConfig();
  renderHabits();
}

function addHabit(){
  const input=document.getElementById('newHabitInput');
  const name=input.value.trim();
  if(!name)return;
  const habits=loadHabits();
  const newId=Math.max(...habits.map(h=>h.id),0)+1;
  habits.push({id:newId,name,weight:5,isFuture:false});
  saveHabits(habits);
  input.value='';
  renderConfig();
  renderHabits();
}

function removeH(id){
  saveHabits(loadHabits().filter(h=>h.id!==id));
  renderConfig();
  renderHabits();
}

function resetDay(){
  ls.set('av2_chk_'+todayKey(),[]);
  renderHabits();
  toast('Dia resetado');
}

// ── TOAST ─────────────────────────────────────────────────
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

// ── TABS ──────────────────────────────────────────────────
function switchTab(tab, btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  btn.classList.add('active');
  if(tab==='semana') renderWeek();
  if(tab==='metas')  renderMetas();
  if(tab==='config') renderConfig();
}

// ── INIT ──────────────────────────────────────────────────
setupDate();
renderHabits();
</script>

</body>
